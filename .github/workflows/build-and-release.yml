# ============================================================
# .github/workflows/build-and-release.yml
#
# Every push to main:
#   → builds the plugin
#   → deletes old "latest" pre-release + tag
#   → creates new "latest" pre-release with correct commit msg
#
# Every version tag (v1.0.0 OR 1.0.0):
#   → builds the plugin
#   → uploads .qlplugin to existing release or creates one
#
# NOTE: Uses MSBuild (not dotnet build) because the project
# targets net462 (full .NET Framework) with WPF.
# NuGet restore is done via  msbuild -t:Restore  because the
# project uses PackageReference (SDK-style), not packages.config.
# `nuget restore` only handles packages.config projects.
# ============================================================

name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1 — Build
  # ───────────────────────────────────────────────────────────
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # SDK-style csproj + PackageReference → must use msbuild -t:Restore
      # (nuget restore only works with packages.config projects)
      - name: Restore NuGet packages
        run: |
          msbuild QuickLook.Plugin.DevPowerTool.sln `
            /t:Restore `
            /p:Configuration=Release `
            /p:Platform="Any CPU"

      - name: Build solution
        run: |
          msbuild QuickLook.Plugin.DevPowerTool.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /m

      - name: Package plugin
        shell: pwsh
        run: |
          $BinDir  = "bin\Release"
          $OutFile = "QuickLook.Plugin.DevPowerTool.qlplugin"
          $TempDir = New-Item `
            -ItemType Directory `
            -Path "$env:TEMP\ql_pack" `
            -Force

          Copy-Item `
            "$BinDir\QuickLook.Plugin.DevPowerTool.dll" `
            -Destination $TempDir

          Copy-Item `
            "$BinDir\QuickLook.Plugin.Metadata.config" `
            -Destination $TempDir

          Copy-Item `
            "$BinDir\ICSharpCode.AvalonEdit.dll" `
            -Destination $TempDir

          Compress-Archive `
            -Path "$TempDir\*" `
            -DestinationPath $OutFile `
            -Force

          Write-Host "Packaged: $OutFile"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool
          path: QuickLook.Plugin.DevPowerTool.qlplugin

  # ───────────────────────────────────────────────────────────
  # JOB 2 — Publish pre-release (main branch only)
  # ───────────────────────────────────────────────────────────
  publish-prerelease:
    needs: build
    runs-on: ubuntu-latest

    permissions: write-all

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool

      - name: Delete old pre-release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest \
            --yes \
            --cleanup-tag \
            2>/dev/null || true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import subprocess

          subject = subprocess.check_output(
              ['git', 'log', '-1', '--pretty=format:%s']
          ).decode().strip()

          body = subprocess.check_output(
              ['git', 'log', '-1', '--pretty=format:%b']
          ).decode().strip()

          msg = subject + ('\n' + body if body else '')

          notes = '''{}

          > ⚠️ This is a pre-release built automatically from the latest commit on \`main\`.
          > For stable builds use a stable release.

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the \`.qlplugin\` file
          3. Click **Install** then restart QuickLook
          '''.format(msg)

          open('/tmp/notes.md', 'w').write(notes)
          "

          gh release create latest \
            --title "latest" \
            --notes-file /tmp/notes.md \
            --prerelease \
            --target main \
            QuickLook.Plugin.DevPowerTool.qlplugin

  # ───────────────────────────────────────────────────────────
  # JOB 3 — Publish stable release (tags only)
  # ───────────────────────────────────────────────────────────
  publish-stable:
    needs: build
    runs-on: ubuntu-latest

    permissions: write-all

    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool

      - name: Upload or create stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists — uploading asset"

            gh release upload \
              "$TAG" \
              QuickLook.Plugin.DevPowerTool.qlplugin \
              --clobber

          else
            echo "Creating release $TAG"

            python3 -c "
          import subprocess

          subject = subprocess.check_output(
              ['git', 'log', '-1', '--pretty=format:%s']
          ).decode().strip()

          body = subprocess.check_output(
              ['git', 'log', '-1', '--pretty=format:%b']
          ).decode().strip()

          msg = subject + ('\n' + body if body else '')

          notes = '''{}

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the \`.qlplugin\` file
          3. Click **Install** then restart QuickLook
          '''.format(msg)

          open('/tmp/notes.md', 'w').write(notes)
          "

            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/notes.md \
              --latest \
              QuickLook.Plugin.DevPowerTool.qlplugin
          fi
