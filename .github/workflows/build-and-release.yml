# ============================================================
# .github/workflows/build-and-release.yml
#
# Every push to main:
#   → deletes old "latest" pre-release + tag
#   → builds the plugin
#   → creates a new "latest" pre-release
#     commit message shown in monospace code block
#
# Every version tag (v1.0.0 OR 1.0.0):
#   → builds the plugin
#   → if release already exists: uploads .qlplugin to it
#   → if release does not exist: creates it with .qlplugin
# ============================================================

name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout + submodules ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Setup MSBuild ────────────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 3. Restore NuGet packages ────────────────────────────────────────
      - name: Restore NuGet packages
        run: nuget restore QuickLook.Plugin.DevPowerTool.sln

      # ── 4. Build Release ─────────────────────────────────────────────────
      # PreBuildEvent="" skips update-version.ps1 inside QuickLook.Common
      # which does not exist in CI.
      - name: Build solution
        run: |
          msbuild QuickLook.Plugin.DevPowerTool.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /m

      # ── 5. Package into .qlplugin ────────────────────────────────────────
      - name: Package plugin
        shell: pwsh
        run: |
          $BinDir  = "bin\Release"
          $OutFile = "QuickLook.Plugin.DevPowerTool.qlplugin"
          $TempDir = New-Item -ItemType Directory -Path "$env:TEMP\ql_pack" -Force

          Copy-Item "$BinDir\QuickLook.Plugin.DevPowerTool.dll"  -Destination $TempDir
          Copy-Item "$BinDir\QuickLook.Plugin.Metadata.config"   -Destination $TempDir
          Copy-Item "$BinDir\ICSharpCode.AvalonEdit.dll"         -Destination $TempDir

          Compress-Archive -Path "$TempDir\*" -DestinationPath $OutFile -Force
          Write-Host "Packaged: $OutFile"

      # ── 6. Upload artifact ───────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool
          path: QuickLook.Plugin.DevPowerTool.qlplugin

      # ════════════════════════════════════════════════════════════════════
      # PRE-RELEASE — every push to main
      # ════════════════════════════════════════════════════════════════════

      - name: Delete old pre-release and tag (if exists)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>&1 | Out-Null
          exit 0

      - name: Create pre-release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $commitMsg = git log -1 --pretty=format:"%B"

          $notes = @"
          ````
          $commitMsg
          ````

          > ⚠️ This is a pre-release built automatically from the latest commit on ``main``. For stable builds use a stable release.

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the ``.qlplugin`` file
          3. Click **Install** then restart QuickLook
          "@

          gh release create latest `
            --title "latest" `
            --notes $notes `
            --prerelease `
            --target main `
            "QuickLook.Plugin.DevPowerTool.qlplugin"

      # ════════════════════════════════════════════════════════════════════
      # STABLE RELEASE — any version tag: v1.0.0 OR 1.0.0
      # If release already exists (created manually): uploads asset to it
      # If release does not exist: creates it with asset
      # ════════════════════════════════════════════════════════════════════

      - name: Upload or create stable release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag       = "${{ github.ref_name }}"
          $commitMsg = git log -1 --pretty=format:"%B"

          # Check if release already exists
          $releaseExists = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            # Release exists — just upload the asset
            Write-Host "Release $tag exists — uploading asset"
            gh release upload $tag "QuickLook.Plugin.DevPowerTool.qlplugin" --clobber
          } else {
            # Release does not exist — create it
            Write-Host "Creating release $tag"
            $notes = @"
          ````
          $commitMsg
          ````

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the ``.qlplugin`` file
          3. Click **Install** then restart QuickLook
          "@
            gh release create $tag `
              --title "$tag" `
              --notes $notes `
              --latest `
              "QuickLook.Plugin.DevPowerTool.qlplugin"
          }
