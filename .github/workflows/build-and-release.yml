# ============================================================
# .github/workflows/build-and-release.yml
#
# Every push to main:
#   → deletes old "latest" pre-release + tag
#   → builds the plugin
#   → creates a new "latest" pre-release using the latest
#     commit message as the release description
#
# Every push of a vX.X.X tag:
#   → builds the plugin
#   → creates a proper stable Release titled "latest"
# ============================================================

name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      # ── 1. Checkout + submodules ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Setup MSBuild ────────────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 3. Restore NuGet packages ────────────────────────────────────────
      - name: Restore NuGet packages
        run: nuget restore QuickLook.Plugin.DevPowerTool.sln

      # ── 4. Build Release ─────────────────────────────────────────────────
      # PreBuildEventUseInParallel=false + PreBuildEvent="" skips the
      # update-version.ps1 pre-build script inside QuickLook.Common.csproj
      # which does not exist in the CI environment.
      - name: Build solution
        run: |
          msbuild QuickLook.Plugin.DevPowerTool.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:PreBuildEvent="" `
            /m

      # ── 5. Package into .qlplugin ────────────────────────────────────────
      - name: Package plugin
        shell: pwsh
        run: |
          $BinDir  = "bin\Release"
          $OutFile = "QuickLook.Plugin.DevPowerTool.qlplugin"
          $TempDir = New-Item -ItemType Directory -Path "$env:TEMP\ql_pack" -Force

          Copy-Item "$BinDir\QuickLook.Plugin.DevPowerTool.dll" -Destination $TempDir
          Copy-Item "$BinDir\QuickLook.Plugin.Metadata.config"  -Destination $TempDir

          Compress-Archive -Path "$TempDir\*" -DestinationPath $OutFile -Force
          Write-Host "Packaged: $OutFile"

      # ── 6. Upload artifact ───────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool
          path: QuickLook.Plugin.DevPowerTool.qlplugin

      # ════════════════════════════════════════════════════════════════════
      # PRE-RELEASE — every push to main
      # Uses the latest commit message as the release description.
      # ════════════════════════════════════════════════════════════════════

      - name: Delete old pre-release and tag (if exists)
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pipe to Out-Null suppresses output; exit 0 ensures we never
          # fail here — on first run the release simply doesn't exist yet.
          gh release delete latest --yes --cleanup-tag 2>&1 | Out-Null
          exit 0

      - name: Create pre-release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── Collect commit info ─────────────────────────────────────────
          $sha         = "${{ github.sha }}".Substring(0, 7)
          $runNum      = "${{ github.run_number }}"
          $date        = (Get-Date -Format "yyyy-MM-dd HH:mm UTC")
          $actor       = "${{ github.actor }}"

          # Full commit message (subject + body if present)
          $commitMsg   = git log -1 --pretty=format:"%B"

          # ── Build release notes ─────────────────────────────────────────
          $notes = @"
          ## ⚡ Latest Pre-release

          ### 📝 $commitMsg

          ---

          | | |
          |---|---|
          | **Commit** | [$sha](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
          | **Run** | [#$runNum](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Author** | $actor |
          | **Built** | $date |

          > ⚠️ This is a pre-release built automatically from the latest commit on ``main``.
          > For stable builds use a versioned release.

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the ``.qlplugin`` file
          3. Click **Install** then restart QuickLook
          "@

          gh release create latest `
            --title "latest" `
            --notes $notes `
            --prerelease `
            --target main `
            "QuickLook.Plugin.DevPowerTool.qlplugin"

          Write-Host "Pre-release 'latest' created"

      # ════════════════════════════════════════════════════════════════════
      # STABLE RELEASE — only when a vX.X.X tag is pushed manually
      # ════════════════════════════════════════════════════════════════════

      - name: Create stable release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag        = "${{ github.ref_name }}"
          $date       = (Get-Date -Format "yyyy-MM-dd HH:mm UTC")
          $commitMsg  = git log -1 --pretty=format:"%B"

          $notes = @"
          ## ✅ Stable Release $tag

          ### 📝 $commitMsg

          ---

          | | |
          |---|---|
          | **Tag** | $tag |
          | **Built** | $date |

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the ``.qlplugin`` file
          3. Click **Install** then restart QuickLook
          "@

          gh release create $tag `
            --title "latest" `
            --notes $notes `
            --latest `
            "QuickLook.Plugin.DevPowerTool.qlplugin"

          Write-Host "Stable release $tag created"
