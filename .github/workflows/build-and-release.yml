# ============================================================
# .github/workflows/build-and-release.yml
#
# Every push to main:
#   → builds the plugin
#   → updates the "latest" pre-release at the top of releases
#     using pyTooling/Actions/releaser (same as QuickLook itself)
#
# Every version tag (v1.0.0 OR 1.0.0):
#   → builds the plugin
#   → uploads .qlplugin to existing release or creates one
# ============================================================

name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  # ── JOB 1: Build ─────────────────────────────────────────────────────────
  build:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore QuickLook.Plugin.DevPowerTool.sln

      - name: Build solution
        run: |
          msbuild QuickLook.Plugin.DevPowerTool.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /m

      - name: Package plugin
        shell: pwsh
        run: |
          $BinDir  = "bin\Release"
          $OutFile = "QuickLook.Plugin.DevPowerTool.qlplugin"
          $TempDir = New-Item -ItemType Directory -Path "$env:TEMP\ql_pack" -Force

          Copy-Item "$BinDir\QuickLook.Plugin.DevPowerTool.dll"  -Destination $TempDir
          Copy-Item "$BinDir\QuickLook.Plugin.Metadata.config"   -Destination $TempDir
          Copy-Item "$BinDir\ICSharpCode.AvalonEdit.dll"         -Destination $TempDir

          Compress-Archive -Path "$TempDir\*" -DestinationPath $OutFile -Force
          Write-Host "Packaged: $OutFile"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool
          path: QuickLook.Plugin.DevPowerTool.qlplugin

  # ── JOB 2: Publish pre-release (main push only) ───────────────────────────
  publish-prerelease:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool

      - name: Update latest pre-release
        uses: pyTooling/Actions/releaser@r6
        with:
          tag: latest
          rm: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: QuickLook.Plugin.DevPowerTool.qlplugin

  # ── JOB 3: Publish stable release (version tag only) ─────────────────────
  publish-stable:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all

    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: QuickLook.Plugin.DevPowerTool

      - name: Upload or create stable release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Check if release already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG exists — uploading asset"
            gh release upload "$TAG" QuickLook.Plugin.DevPowerTool.qlplugin --clobber
          else
            echo "Creating release $TAG"
            COMMIT_MSG=$(git log -1 --pretty=format:"%s%n%b")
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "\`\`\`
          $COMMIT_MSG
          \`\`\`

          ### Install
          1. Make sure QuickLook is running
          2. Press **Space** on the \`.qlplugin\` file
          3. Click **Install** then restart QuickLook" \
              --latest \
              QuickLook.Plugin.DevPowerTool.qlplugin
          fi
